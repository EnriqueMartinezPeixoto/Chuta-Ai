<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Criar Conta - CHUTA AÍ!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111111;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            box-sizing: border-box;
        }
        .header-logo { text-align: center; margin-bottom: 30px; }
        .icone-bola { font-size: 55px; margin-bottom: 5px; }
        .titulo { color: #d32f2f; font-size: 36px; font-weight: 900; letter-spacing: 1px; margin: 0; text-transform: uppercase; }
        .subtitulo { color: #888888; font-size: 15px; margin-top: 5px; }

        .tabs-container { display: flex; background-color: #1e1e1e; border-radius: 12px; margin-bottom: 30px; padding: 5px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .tab-active { background-color: #d32f2f; color: #ffffff; }
        .tab-inactive { background-color: transparent; color: #888888; }
        .tab-inactive:hover { color: #ffffff; }

        .p-field { margin-bottom: 20px; text-align: left; }
        .p-field label { font-weight: normal; color: #aaaaaa; display: block; margin-bottom: 8px; font-size: 0.85em; }
        .ui-inputfield { width: 100% !important; box-sizing: border-box; padding: 15px !important; border-radius: 10px !important; border: 1px solid #2a2a2a !important; background-color: #1a1a1a !important; color: #ffffff !important; box-shadow: none !important; }
        .ui-inputfield:focus { border-color: #d32f2f !important; background-color: #222222 !important; }

        .senha-hint { font-size: 0.75em; color: #888888; margin-top: -10px; margin-bottom: 25px; display: flex; align-items: center; gap: 5px; }
        .btn-login { width: 100%; background-color: #d32f2f !important; border: none !important; font-weight: bold !important; padding: 15px 0 !important; font-size: 16px !important; border-radius: 10px !important; color: white !important; }
    </style>
</h:head>

<h:body>
    <div class="login-box">
        <div class="header-logo">
            <div class="icone-bola">⚽</div>
            <h1 class="titulo">CHUTA AÍ!</h1>
            <div class="subtitulo">Bolão Copa 2026</div>
        </div>

        <div class="tabs-container">
            <a href="index.xhtml" class="tab tab-inactive">Entrar</a>
            <a href="#" class="tab tab-active">Criar Conta</a>
        </div>

        <h:form id="formCadastro">
            <p:messages id="mensagens" showDetail="false" closable="true">
                <p:autoUpdate/>
            </p:messages>

            <div class="ui-fluid">
                <div class="p-field">
                    <p:outputLabel for="nome" value="Nome" />
                    <p:inputText id="nome" value="#{usuarioController.novoUsuario.nome}"
                                 required="true" requiredMessage="O nome é obrigatório"
                                 placeholder="Seu nome"/>
                </div>

                <div class="p-field">
                    <p:outputLabel for="email" value="Email" />
                    <p:inputText id="email" value="#{usuarioController.novoUsuario.email}"
                                 required="true" requiredMessage="O e-mail é obrigatório"
                                 placeholder="seu@email.com"/>
                </div>

                <div class="p-field" style="margin-bottom: 15px;">
                    <p:outputLabel for="senha" value="Criar Senha" />
                    <p:password id="senha" value="#{usuarioController.novoUsuario.senha}"
                                match="senha2" validatorMessage="As senhas digitadas não são iguais!"
                                required="true" requiredMessage="A senha é obrigatória"
                                placeholder="Mínimo 6 caracteres"/>
                </div>

                <div class="p-field" style="margin-bottom: 15px;">
                    <p:outputLabel for="senha2" value="Confirmar Senha" />
                    <p:password id="senha2" required="true" requiredMessage="Você precisa confirmar a senha"
                                placeholder="Repita a senha"/>
                </div>

                <div class="senha-hint">
                    <i class="pi pi-lock"></i> Senha forte: use números e letras (mínimo 6 caracteres)
                </div>
            </div>

            <p:commandButton value="Criar Conta" action="#{usuarioController.cadastrar}"
                             styleClass="btn-login" ajax="false" />
        </h:form>
    </div>
</h:body>
</html>
