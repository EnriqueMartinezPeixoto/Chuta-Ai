<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<f:metadata>
    <f:viewParam name="id" value="#{rankingPrivadoController.bolaoId}" />
    <f:viewAction action="#{rankingPrivadoController.carregarRanking}" />
</f:metadata>

<h:head>
    <title>Ranking Privado - CHUTA AÍ!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        /* Fundo escuro padrão */
        body { background-color: #0f0f0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; color: #ffffff; }

        /* Navbar escura com logo vermelha */
        .navbar { background-color: #1a1a1a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; margin-bottom: 30px; }
        .logo { margin: 0; color: #e53935; font-weight: 900; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .nav-controls { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }

        .user-name { font-weight: normal; color: #aaaaaa !important; padding-right: 15px; border-right: 1px solid #333; }
        .ui-button-plain { color: #aaaaaa !important; text-transform: uppercase; font-size: 0.85em !important; font-weight: 600 !important; letter-spacing: 0.5px; }
        .ui-button-plain:hover { color: #ffffff !important; background: transparent !important; }
        .btn-sair { color: #555 !important; font-weight: bold !important; text-decoration: none; }
        .btn-sair:hover { color: #e53935 !important; }

        .container { max-width: 800px; margin: 0 auto 40px auto; padding: 0 20px; }

        /* Cabeçalho do Bolão Escuro */
        .bolao-header { background: #1c1c1e; padding: 30px 20px; border-radius: 12px 12px 0 0; text-align: center; position: relative; border: 1px solid #2c2c2e; border-bottom: none; }
        .bolao-header h2 { margin: 0 0 15px 0; font-size: 2.2em; color: #ffffff; }
        .bolao-code { background: #2c2c2e; padding: 5px 15px; border-radius: 8px; font-family: monospace; font-size: 1.2em; letter-spacing: 2px; color: #e53935; font-weight: bold; border: 1px solid #444; }

        /* Tabela de Ranking Dark */
        .ranking-card { border-radius: 0 0 12px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; border: 1px solid #2c2c2e; border-top: none; }
        .ui-datatable { background: #1c1c1e; }
        .ui-datatable .ui-datatable-header { background: #1c1c1e !important; border: none !important; border-bottom: 1px solid #2c2c2e !important; padding: 15px 20px !important; font-size: 1.2em; font-weight: 800; color: #ffffff !important; text-align: left; }
        .ui-datatable th { background-color: #1a1a1a !important; border: none !important; border-bottom: 1px solid #2c2c2e !important; color: #888888 !important; font-weight: 700 !important; text-transform: uppercase; font-size: 0.85em; letter-spacing: 0.5px; padding: 15px !important; }
        .ui-datatable td { background-color: #1c1c1e !important; border: none !important; border-bottom: 1px solid #2c2c2e !important; padding: 18px 15px !important; color: #ffffff !important; }
        .ui-datatable tr:hover td { background-color: #242426 !important; }

        /* Cores do Pódio adaptadas para Dark Mode */
        .podio-1 { background-color: rgba(255, 215, 0, 0.08) !important; color: #ffd700 !important; } /* Dourado Escuro */
        .podio-2 { background-color: rgba(192, 192, 192, 0.05) !important; color: #e0e0e0 !important; } /* Prata Escuro */
        .podio-3 { background-color: rgba(205, 127, 50, 0.08) !important; color: #cd7f32 !important; } /* Bronze Escuro */

        .posicao-texto { font-size: 1.8em; font-weight: 900; }
        .pontos-texto { font-size: 1.5em; font-weight: 900; color: #e53935; }

        /* OBRIGANDO OS POP-UPS (DIALOGS) A FICAREM ESCUROS */
        .ui-dialog { background-color: #1c1c1e !important; border: 1px solid #444 !important; box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important; border-radius: 12px !important; }
        .ui-dialog-titlebar { background-color: #1a1a1a !important; color: #ffffff !important; border-bottom: 1px solid #333 !important; padding: 15px !important; border-radius: 12px 12px 0 0 !important; }
        .ui-dialog-content { background-color: #1c1c1e !important; color: #dddddd !important; padding: 20px !important; }
        .ui-dialog .ui-dialog-titlebar-icon { color: #aaaaaa !important; }
        .ui-dialog .ui-dialog-titlebar-icon:hover { color: #ffffff !important; }
        .ui-confirm-dialog-message { color: #dddddd !important; font-size: 1.1em; }

        /* CORREÇÃO DA BARRA DE BOTÕES INFERIOR DO POP-UP */
        .ui-dialog .ui-dialog-buttonpane { background-color: #1c1c1e !important; border-top: 1px solid #333 !important; margin: 0 !important; padding: 15px !important; border-radius: 0 0 12px 12px !important; }

        /* BOTÃO CANCELAR DO POP-UP */
        .ui-confirmdialog-no { background-color: transparent !important; color: #aaaaaa !important; border: 1px solid #555 !important; border-radius: 8px !important; padding: 5px 15px !important; font-weight: bold !important; }
        .ui-confirmdialog-no:hover { background-color: #2c2c2e !important; color: #ffffff !important; border-color: #ffffff !important; }

        /* BOTÃO CONFIRMAR (VERMELHO) DO POP-UP */
        .ui-confirmdialog-yes { background-color: #e53935 !important; color: #ffffff !important; border: none !important; border-radius: 8px !important; padding: 6px 15px !important; font-weight: bold !important; text-shadow: none !important; }
        .ui-confirmdialog-yes:hover { background-color: #c62828 !important; }
    </style>
</h:head>

<h:body>
    <div class="navbar">
        <h2 class="logo">⚽ CHUTA AÍ!</h2>
        <h:form id="navForm">
            <div class="nav-controls">
                <p:commandLink value="#{loginController.usuarioLogado.nome}" action="perfil?faces-redirect=true" styleClass="user-name" style="text-decoration: none;" ajax="false" />
                <p:commandButton value="Voltar aos Bolões" icon="pi pi-arrow-left" action="bolao?faces-redirect=true" styleClass="ui-button-flat ui-button-plain" ajax="false"/>
                <p:commandLink value="Sair" action="#{loginController.logout}" styleClass="btn-sair" ajax="false"/>
            </div>
        </h:form>
    </div>

    <div class="container">

        <p:messages id="msgs" closable="true"><p:autoUpdate /></p:messages>

        <h:panelGroup rendered="#{rankingPrivadoController.bolao != null}">

            <div class="bolao-header">
                <h2>🏆 #{rankingPrivadoController.bolao.nome}</h2>
                <p style="margin:0; color: #aaa;">Código de Convite: <span class="bolao-code">#{rankingPrivadoController.bolao.codigoAcesso}</span></p>

                <h:form id="formAcoesDono">
                    <p:commandButton value="Encerrar Bolão" icon="pi pi-trash"
                                     action="#{rankingPrivadoController.encerrarBolao}"
                                     rendered="#{rankingPrivadoController.souDono}"
                                     styleClass="ui-button-danger"
                                     style="margin-top: 20px; border-radius: 20px; font-weight: bold;">
                        <p:confirm header="Atenção!" message="Tem certeza que deseja DELETAR este bolão para todos os participantes?" icon="pi pi-exclamation-triangle" />
                    </p:commandButton>
                </h:form>
            </div>

            <div class="ranking-card">
                <h:form id="formTabela">
                    <p:dataTable value="#{rankingPrivadoController.rankingParticipantes}" var="u" rowIndexVar="index" style="text-align: center;">

                        <p:column headerText="Posição" width="100"
                                  styleClass="#{index == 0 ? 'podio-1' : (index == 1 ? 'podio-2' : (index == 2 ? 'podio-3' : ''))}">
                            <h:outputText value="#{index + 1}º" class="posicao-texto" style="#{index > 2 ? 'color: #555;' : ''}"/>
                        </p:column>

                        <p:column headerText="Apostador" style="text-align: left; font-size: 1.2em; font-weight: bold;">
                            <i class="pi pi-user" style="margin-right: 8px; color: #666;"></i> #{u.nome}
                            <h:outputText value=" 👑" rendered="#{u.id == rankingPrivadoController.bolao.dono.id}" title="Dono do Bolão" />
                        </p:column>

                        <p:column headerText="Pontuação" width="100">
                            <h:outputText value="#{u.pontosTotal}" class="pontos-texto" />
                            <span style="font-size: 0.8em; color: #888; display: block; text-transform: uppercase;">pts</span>
                        </p:column>

                        <p:column headerText="Ações" width="100" rendered="#{rankingPrivadoController.souDono}">
                            <p:commandButton icon="pi pi-user-minus"
                                             action="#{rankingPrivadoController.expulsarParticipante(u)}"
                                             rendered="#{u.id != rankingPrivadoController.bolao.dono.id}"
                                             update="@form"
                                             styleClass="ui-button-danger ui-button-flat rounded-button"
                                             title="Remover Participante">
                                <p:confirm header="Remover do Bolão" message="Expulsar #{u.nome} deste bolão?" icon="pi pi-info-circle" />
                            </p:commandButton>
                        </p:column>

                    </p:dataTable>
                </h:form>
            </div>
        </h:panelGroup>

        <h:form>
            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="400">
                <p:commandButton value="Cancelar" type="button" styleClass="ui-confirmdialog-no ui-button-flat" style="color: #aaa;"/>
                <p:commandButton value="Sim, Confirmar" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" style="border-radius: 8px;" />
            </p:confirmDialog>
        </h:form>

    </div>
</h:body>
</html>
