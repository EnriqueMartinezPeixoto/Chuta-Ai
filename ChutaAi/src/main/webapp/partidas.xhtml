<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>Jogos - CHUTA AÍ!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        /* Fundo escuro igual ao print */
        body { background-color: #0f0f0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; color: #ffffff; }

        /* Navbar escura com logo vermelha */
        .navbar { background-color: #1a1a1a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; }
        .logo { margin: 0; color: #e53935; font-weight: 900; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .nav-controls { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }

        /* Links e textos da navbar em tons de cinza/branco */
        .user-name { font-weight: normal; color: #aaaaaa !important; padding-right: 15px; border-right: 1px solid #333; }
        .ui-button-plain { color: #aaaaaa !important; text-transform: uppercase; font-size: 0.85em !important; font-weight: 600 !important; letter-spacing: 0.5px; }
        .ui-button-plain:hover { color: #ffffff !important; background: transparent !important; }
        .btn-sair { color: #555 !important; font-weight: bold !important; text-decoration: none; }
        .btn-sair:hover { color: #e53935 !important; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* O Cartão do Jogo reestilizado */
        .match-card {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Layout interno do cartão (Times em cima, Data embaixo) */
        .match-info-container { display: flex; flex-direction: column; gap: 6px; }
        .teams-row { font-weight: 700; font-size: 1.1em; color: #ffffff; display: flex; align-items: center; }
        .vs { color: #666; font-size: 0.9em; font-weight: normal; margin: 0 6px; }

        .date-row { font-size: 0.8em; color: #888888; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .phase-label { color: #e53935; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .dot { color: #444; }

        /* Botão de Palpite Vermelho Arredondado */
        .btn-palpite {
            background-color: #e53935 !important;
            color: white !important;
            border: none !important;
            padding: 8px 24px !important;
            border-radius: 20px !important;
            font-weight: 700 !important;
            font-size: 0.95em !important;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-palpite:hover { background-color: #c62828 !important; }
    </style>
</h:head>

<h:body>
    <div class="navbar">
        <h2 class="logo">⚽ CHUTA AÍ!</h2>
        <h:form id="navForm">
            <div class="nav-controls">
                <p:commandLink value="#{loginController.usuarioLogado.nome}"
                               action="perfil?faces-redirect=true"
                               styleClass="user-name"
                               style="text-decoration: none;"
                               ajax="false"
                               title="Editar Meu Perfil" />

                <h:panelGroup rendered="#{loginController.usuarioLogado.admin}">
                    <p:commandButton value="Gestor" icon="pi pi-cog" action="admin_dashboard?faces-redirect=true" styleClass="ui-button-warning ui-button-flat" style="font-weight: bold;" ajax="false"/>
                </h:panelGroup>

                <p:commandButton value="Meus Palpites" action="palpite?faces-redirect=true" styleClass="ui-button-flat ui-button-plain" ajax="false"/>
                <p:commandButton value="Meus Bolões" action="bolao?faces-redirect=true" styleClass="ui-button-flat ui-button-plain" ajax="false"/>
                <p:commandButton value="Ranking" action="ranking?faces-redirect=true" styleClass="ui-button-flat ui-button-plain" ajax="false"/>

                <p:commandLink value="Sair" action="#{loginController.logout}" styleClass="btn-sair" ajax="false"/>
            </div>
        </h:form>
    </div>

    <div class="container">
        <h:form id="form">
            <p:messages id="msgs" closable="true"><p:autoUpdate /></p:messages>

            <ui:repeat value="#{partidaController.listaPartidas}" var="p">
                <h:panelGroup rendered="#{p.placarCasaReal == null}">

                    <div class="match-card">
                        <div class="match-info-container">
                            <div class="teams-row">
                                <h:outputText value="#{p.timeCasa}" />
                                <span class="vs">×</span>
                                <h:outputText value="#{p.timeFora}" />
                            </div>
                            <div class="date-row">
                                <span class="phase-label">#{p.fase}</span>
                                <span class="dot">•</span>
                                <h:outputText value="#{p.dataHora}">
                                    <f:convertDateTime pattern="dd/MM/yyyy HH:mm" timeZone="America/Belem"/>
                                </h:outputText>
                            </div>
                        </div>

                        <div class="action-area">
                            <h:commandButton value="Palpite"
                                             action="#{palpiteController.irParaPalpite(p)}"
                                             styleClass="btn-palpite">
                            </h:commandButton>
                        </div>
                    </div>

                </h:panelGroup>
            </ui:repeat>
        </h:form>
    </div>
</h:body>
</html>
